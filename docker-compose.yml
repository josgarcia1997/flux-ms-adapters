services:
  identity:
    build: .
    ports:
      - "${PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: 3000
      TENANT_ID: ${TENANT_ID}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-15m}
      # Use your Laravel Postgres: from host set DB_HOST=host.docker.internal and DB_PORT=<mapped port>
      DB_HOST: ${DB_HOST:-host.docker.internal}
      DB_PORT: ${DB_PORT:-5433}
      DB_DATABASE: ${DB_DATABASE:-flux}
      DB_USERNAME: ${DB_USERNAME:-flux}
      DB_PASSWORD: ${DB_PASSWORD:-flux}
      DB_LOGGING: ${DB_LOGGING:-false}
    restart: unless-stopped

  # Optional: only if you want a local Postgres (e.g. docker compose --profile db up -d)
  postgres:
    profiles:
      - db
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USERNAME:-flux}
      POSTGRES_DB: ${DB_DATABASE:-flux}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-flux}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${POSTGRES_HOST_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U flux -d flux"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
